name: openclaw-paywall

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - deploy-hook

  app-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${APP_DB_NAME}
      POSTGRES_USER: ${APP_DB_USER}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - app_db_data:/var/lib/postgresql/data

  gateway:
    build:
      context: ../..
      dockerfile: deploy/hetzner/Dockerfile.gateway
    restart: unless-stopped
    environment:
      OPENCLAW_GATEWAY_PORT: 3005
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      NODE_OPTIONS: --max-old-space-size=1536
    volumes:
      - openclaw_config:/root/.openclaw

  mc-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MC_DB_NAME}
      POSTGRES_USER: ${MC_DB_USER}
      POSTGRES_PASSWORD: ${MC_DB_PASSWORD}
    volumes:
      - mc_db_data:/var/lib/postgresql/data

  mc-redis:
    image: redis:7-alpine
    restart: unless-stopped

  mc-backend:
    build:
      context: ../../mission-control
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${MC_DB_USER}:${MC_DB_PASSWORD}@mc-db:5432/${MC_DB_NAME}
      CORS_ORIGINS: ${APP_URL}
      DB_AUTO_MIGRATE: "true"
      AUTH_MODE: proxy
      LOCAL_AUTH_TOKEN: ${MISSION_CONTROL_TOKEN}
      BASE_URL: ${APP_URL}/mc-api
      RQ_REDIS_URL: redis://mc-redis:6379/0
    depends_on:
      - mc-db
      - mc-redis

  mc-worker:
    build:
      context: ../../mission-control
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: ["python", "scripts/rq-docker", "worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://${MC_DB_USER}:${MC_DB_PASSWORD}@mc-db:5432/${MC_DB_NAME}
      AUTH_MODE: proxy
      LOCAL_AUTH_TOKEN: ${MISSION_CONTROL_TOKEN}
      BASE_URL: ${APP_URL}/mc-api
      RQ_REDIS_URL: redis://mc-redis:6379/0
    depends_on:
      - mc-db
      - mc-redis

  mc-frontend:
    build:
      context: ../../mission-control/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: auto
        NEXT_PUBLIC_AUTH_MODE: proxy
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: auto
      NEXT_PUBLIC_AUTH_MODE: proxy
    depends_on:
      - mc-backend

  paperclip:
    image: node:22-bookworm-slim
    restart: unless-stopped
    working_dir: /paperclip
    user: "node"
    command:
      [
        "sh",
        "-lc",
        "npx -y paperclipai onboard --yes || true; npx -y paperclipai allowed-hostname getlobster.org || true; npx -y paperclipai allowed-hostname www.getlobster.org || true; npx -y paperclipai allowed-hostname 178.156.231.45 || true; npx -y paperclipai auth bootstrap-ceo --force --expires-hours 720 --base-url ${APP_URL}/paperclip 2>&1 | sed -n 's/.*Invite URL: //p' | tail -n 1 | tr -d '\\r' > /paperclip-data/bootstrap_invite_url.txt || true; npx -y paperclipai run",
      ]
    environment:
      HOST: 0.0.0.0
      PORT: 3100
      APP_URL: ${APP_URL}
      PAPERCLIP_HOME: /paperclip-data
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      BETTER_AUTH_BASE_URL: ${APP_URL}/paperclip
      DATABASE_URL: postgres://${APP_DB_USER}:${APP_DB_PASSWORD}@app-db:5432/paperclip
    volumes:
      - paperclip_data:/paperclip-data
    depends_on:
      - app-db

  app:
    build:
      context: ../..
      dockerfile: deploy/hetzner/Dockerfile.app
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      APP_URL: ${APP_URL}
      DATABASE_URL: postgres://${APP_DB_USER}:${APP_DB_PASSWORD}@app-db:5432/${APP_DB_NAME}
      SESSION_SECRET: ${SESSION_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      AI_INTEGRATIONS_ANTHROPIC_BASE_URL: ${AI_INTEGRATIONS_ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      AI_INTEGRATIONS_ANTHROPIC_API_KEY: ${AI_INTEGRATIONS_ANTHROPIC_API_KEY:-sk-ant-not-configured}
      OPENCLAW_GATEWAY_URL: http://gateway:3005
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      MISSION_CONTROL_BACKEND_URL: http://mc-backend:8000
      MISSION_CONTROL_FRONTEND_URL: http://mc-frontend:3000
      MISSION_CONTROL_AUTH_MODE: proxy
      MISSION_CONTROL_TOKEN: ${MISSION_CONTROL_TOKEN}
      PAPERCLIP_URL: http://paperclip:3100
      PAPERCLIP_BOOTSTRAP_INVITE_FILE: /paperclip-data/bootstrap_invite_url.txt
    depends_on:
      - app-db
      - gateway
      - mc-backend
      - mc-frontend
      - paperclip
    volumes:
      - openclaw_config:/root/.openclaw
      - paperclip_data:/paperclip-data:ro

  deploy-hook:
    build:
      context: ../..
      dockerfile: deploy/hetzner/Dockerfile.deploy-hook
    restart: unless-stopped
    environment:
      DEPLOY_WEBHOOK_SECRET: ${DEPLOY_WEBHOOK_SECRET}
      DEPLOY_GIT_BRANCH: ${DEPLOY_GIT_BRANCH:-master}
      DEPLOY_GIT_REMOTE: ${DEPLOY_GIT_REMOTE:-origin}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../..:/workspace

volumes:
  app_db_data:
  mc_db_data:
  openclaw_config:
  paperclip_data:
  caddy_data:
  caddy_config:
