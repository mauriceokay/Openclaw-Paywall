<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>OpenClaw</title>
    <meta
      name="description"
      content="OpenClaw Cloud is a self-hosted AI assistant platform. Connect Telegram, WhatsApp, Discord, and more, then run your own private AI workflows in minutes."
    />

    <!-- Theme color for browser UI and PWA -->
    <meta name="theme-color" content="#ff512f" />
    <meta name="msapplication-TileColor" content="#ff512f" />

    <!-- iOS / Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OpenClaw" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Preconnect to Google Fonts for faster LCP -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- DNS prefetch for analytics / CDN origins -->
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
